<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalistická kalkulačka dnů</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Moderní CSS proměnné pro snadnou změnu barev */
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent: #3b82f6;       /* Minimalistická modrá */
            --accent-hover: #2563eb;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .kontejner {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); /* Velmi jemný stín */
            width: 100%;
            max-width: 460px;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 8px 0;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
            margin-top: 0;
        }

        /* Uspořádání vstupních polí vedle sebe */
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            color: var(--text-main);
        }

        /* Efekt při kliknutí do políčka */
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-family: 'Inter', sans-serif;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        /* Jemné zmenšení tlačítka při kliknutí */
        button:active {
            transform: scale(0.98);
        }

        .vysledek {
            margin-top: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            background-color: var(--bg-color);
            display: none; /* Skryto, dokud není výsledek */
        }

        hr {
            border: 0;
            height: 1px;
            background: var(--border-color);
            margin: 32px 0;
        }
    </style>
</head>
<body>

    <div class="kontejner">
        <h2>Rozdíl mezi dvěma daty</h2>
        <p>Zjistěte přesný počet dní.</p>
        
        <div class="input-group">
            <input type="date" id="datumA">
            <input type="date" id="datumB">
        </div>
        <button onclick="spocitejRozdil()">Spočítat dny</button>
        <div id="vysledek1" class="vysledek"></div>
        
        <hr>

        <h2>Kdy to bude?</h2>
        <p>Přičtěte počet dnů k vybranému datu.</p>
        
        <div class="input-group">
            <input type="date" id="vychoziDatum">
            <input type="number" id="pocetDni" placeholder="Počet dnů (např. 10000)">
        </div>
        <button onclick="zjistiDatum()">Zjistit přesné datum</button>
        <div id="vysledek2" class="vysledek"></div>
    </div>

    <script>
        function ukazVysledek(elementId, text, jeChyba = false) {
            const el = document.getElementById(elementId);
            el.style.display = 'block';
            el.innerText = text;
            el.style.color = jeChyba ? 'var(--error)' : 'var(--text-main)';
            el.style.backgroundColor = jeChyba ? '#fef2f2' : 'var(--bg-color)';
        }

        function spocitejRozdil() {
            const vstupA = document.getElementById('datumA').value;
            const vstupB = document.getElementById('datumB').value;

            if (!vstupA || !vstupB) {
                ukazVysledek('vysledek1', 'Prosím, vyplňte obě data.', true);
                return;
            }

            const datumA = new Date(vstupA);
            const datumB = new Date(vstupB);
            
            datumA.setHours(0, 0, 0, 0);
            datumB.setHours(0, 0, 0, 0);

            const rozdilMilisekundy = Math.abs(datumB - datumA);
            const rozdilDny = Math.floor(rozdilMilisekundy / (1000 * 60 * 60 * 24));

            ukazVysledek('vysledek1', `Tato data od sebe dělí přesně ${rozdilDny} dní.`);
        }

        function zjistiDatum() {
            const vstupDatum = document.getElementById('vychoziDatum').value;
            const pocetDni = parseInt(document.getElementById('pocetDni').value);

            if (!vstupDatum || isNaN(pocetDni)) {
                ukazVysledek('vysledek2', 'Prosím, vyberte datum a zadejte počet dnů.', true);
                return;
            }

            const ciloveDatum = new Date(vstupDatum);
            ciloveDatum.setDate(ciloveDatum.getDate() + pocetDni);

            const den = ciloveDatum.getDate();
            const mesic = ciloveDatum.getMonth() + 1;
            const rok = ciloveDatum.getFullYear();

            ukazVysledek('vysledek2', `Za ${pocetDni} dnů bude: ${den}. ${mesic}. ${rok}`);
        }
    </script>

</body>
</html>
