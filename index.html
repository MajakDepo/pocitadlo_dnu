<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulačka dnů | Teplý design</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* Nová teplá a příjemná barevná paleta */
        :root {
            --bg-color: #FAF9F6;      /* Slonová kost / teplá bílá na pozadí */
            --card-bg: #ffffff;       /* Čistě bílá pro samotnou kartu kalkulačky */
            --text-main: #2C363F;     /* Tmavá antracitová pro text (jemnější než černá) */
            --text-muted: #8A95A5;    /* Jemná šedo-modrá pro popisky */
            --border-color: #E2E8F0;  /* Světle šedá pro ohraničení */
            --accent: #D27D60;        /* Příjemná terakotová pro tlačítka a efekty */
            --accent-hover: #B8654A;  /* Tmavší terakotová při najetí myší */
            --error: #E05263;         /* Tlumená červená pro chyby */
            --success-text: #4A7C59;  /* Uklidňující šalvějově zelená pro výsledky */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .kontejner {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.04); /* Ještě jemnější a širší stín */
            width: 100%;
            max-width: 460px;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.02em; /* Moderní mírné sražení písmen */
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
            margin-top: 0;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border-color); /* Mírně silnější okraj pro lepší vzhled */
            border-radius: 10px; /* Větší zaoblení */
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            color: var(--text-main);
            background-color: #FAFAFA;
        }

        input:focus {
            border-color: var(--accent);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(210, 125, 96, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 6px rgba(210, 125, 96, 0.2); /* Jemný stín v barvě tlačítka */
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px); /* Tlačítko mírně "povyskočí" */
            box-shadow: 0 6px 10px rgba(210, 125, 96, 0.25);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 4px rgba(210, 125, 96, 0.2);
        }

        .vysledek {
            margin-top: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            padding: 14px;
            border-radius: 10px;
            background-color: var(--bg-color);
            display: none;
        }

        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent); /* Elegantnější oddělovač */
            margin: 32px 0;
        }
    </style>
</head>
<body>

    <div class="kontejner">
        <h2>Rozdíl mezi dvěma daty</h2>
        <p>Zjistěte přesný počet dní.</p>
        
        <div class="input-group">
            <input type="date" id="datumA">
            <input type="date" id="datumB">
        </div>
        <button onclick="spocitejRozdil()">Spočítat dny</button>
        <div id="vysledek1" class="vysledek"></div>
        
        <hr>

        <h2>Kdy to bude?</h2>
        <p>Přičtěte počet dnů k vybranému datu.</p>
        
        <div class="input-group">
            <input type="date" id="vychoziDatum">
            <input type="number" id="pocetDni" placeholder="Počet dnů (např. 10000)">
        </div>
        <button onclick="zjistiDatum()">Zjistit přesné datum</button>
        <div id="vysledek2" class="vysledek"></div>
    </div>

    <script>
        function ukazVysledek(elementId, text, jeChyba = false) {
            const el = document.getElementById(elementId);
            el.style.display = 'block';
            el.innerText = text;
            
            if (jeChyba) {
                el.style.color = 'var(--error)';
                el.style.backgroundColor = '#FFF0F2'; // Velmi jemná červená pro pozadí chyby
            } else {
                el.style.color = 'var(--success-text)';
                el.style.backgroundColor = '#F0F7F2'; // Velmi jemná zelená pro úspěšný výsledek
            }
        }

        function spocitejRozdil() {
            const vstupA = document.getElementById('datumA').value;
            const vstupB = document.getElementById('datumB').value;

            if (!vstupA || !vstupB) {
                ukazVysledek('vysledek1', 'Prosím, vyplňte obě data.', true);
                return;
            }

            const datumA = new Date(vstupA);
            const datumB = new Date(vstupB);
            
            datumA.setHours(0, 0, 0, 0);
            datumB.setHours(0, 0, 0, 0);

            const rozdilMilisekundy = Math.abs(datumB - datumA);
            const rozdilDny = Math.floor(rozdilMilisekundy / (1000 * 60 * 60 * 24));

            ukazVysledek('vysledek1', `Tato data od sebe dělí přesně ${rozdilDny} dní.`);
        }

        function zjistiDatum() {
            const vstupDatum = document.getElementById('vychoziDatum').value;
            const pocetDni = parseInt(document.getElementById('pocetDni').value);

            if (!vstupDatum || isNaN(pocetDni)) {
                ukazVysledek('vysledek2', 'Prosím, vyberte datum a zadejte počet dnů.', true);
                return;
            }

            const ciloveDatum = new Date(vstupDatum);
            ciloveDatum.setDate(ciloveDatum.getDate() + pocetDni);

            const den = ciloveDatum.getDate();
            const mesic = ciloveDatum.getMonth() + 1;
            const rok = ciloveDatum.getFullYear();

            ukazVysledek('vysledek2', `Za ${pocetDni} dnů bude: ${den}. ${mesic}. ${rok}.`);
        }
    </script>

</body>
</html>
