<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulačka dnů</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #FAF9F6;
            --card-bg: #ffffff;
            --text-main: #2C363F;
            --text-muted: #8A95A5;
            --border-color: #E2E8F0;
            --accent: #D27D60;
            --accent-hover: #B8654A;
            --error: #E05263;
            --success-text: #4A7C59;
        }

        /* Dědičný box-sizing - nejjistější metoda pro prevenci přetečení */
        html {
            box-sizing: border-box;
        }
        *, *::before, *::after {
            box-sizing: inherit;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            
            /* Zapnutí flexboxu pro centrování */
            display: flex;
            justify-content: center;
            align-items: center; 
            
            min-height: 100dvh; 
            
            /* KLÍČOVÁ ZMĚNA: Mantinely jsou nyní přímo na stránce. 
               Zajistí, že cokoliv uvnitř bude vždy 16px od okrajů displeje. */
            padding: 16px; 
        }

        .kontejner {
            background-color: var(--card-bg);
            padding: 32px 24px; 
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            
            /* Karta bere 100 % dostupného místa mezi mantinely výše, nikdy víc */
            width: 100%; 
            max-width: 420px;
            margin: 0; /* Žádné další odsazování, necháme flexbox dělat svou práci */
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 6px 0;
            letter-spacing: -0.02em;
            text-align: center;
        }

        p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 20px;
            margin-top: 0;
            text-align: center;
        }

        .input-group {
            display: flex;
            flex-direction: column; 
            gap: 12px;
            margin-bottom: 16px;
        }

        @media (min-width: 380px) {
            .input-group {
                flex-direction: row;
            }
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            color: var(--text-main);
            background-color: #FAFAFA;
            appearance: none; 
        }

        input:focus {
            border-color: var(--accent);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(210, 125, 96, 0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 6px rgba(210, 125, 96, 0.2);
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 10px rgba(210, 125, 96, 0.25);
        }

        button:active {
            transform: translateY(1px);
            box-shadow: 0 2px 4px rgba(210, 125, 96, 0.2);
        }

        .vysledek {
            margin-top: 16px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            background-color: var(--bg-color);
            display: none;
        }

        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
            margin: 24px 0;
        }
    </style>
</head>
<body>

    <div class="kontejner">
        <h2>Rozdíl mezi dvěma daty</h2>
        <p>Zjistěte přesný počet dní.</p>
        
        <div class="input-group">
            <input type="date" id="datumA">
            <input type="date" id="datumB">
        </div>
        <button onclick="spocitejRozdil()">Spočítat dny</button>
        <div id="vysledek1" class="vysledek"></div>
        
        <hr>

        <h2>Kdy to bude?</h2>
        <p>Přičtěte počet dnů k vybranému datu.</p>
        
        <div class="input-group">
            <input type="date" id="vychoziDatum">
            <input type="number" id="pocetDni" placeholder="Počet dnů (např. 10000)">
        </div>
        <button onclick="zjistiDatum()">Zjistit přesné datum</button>
        <div id="vysledek2" class="vysledek"></div>
    </div>

    <script>
        function ukazVysledek(elementId, text, jeChyba = false) {
            const el = document.getElementById(elementId);
            el.style.display = 'block';
            el.innerText = text;
            
            if (jeChyba) {
                el.style.color = 'var(--error)';
                el.style.backgroundColor = '#FFF0F2';
            } else {
                el.style.color = 'var(--success-text)';
                el.style.backgroundColor = '#F0F7F2';
            }
        }

        function spocitejRozdil() {
            const vstupA = document.getElementById('datumA').value;
            const vstupB = document.getElementById('datumB').value;

            if (!vstupA || !vstupB) {
                ukazVysledek('vysledek1', 'Prosím, vyplňte obě data.', true);
                return;
            }

            const datumA = new Date(vstupA);
            const datumB = new Date(vstupB);
            
            datumA.setHours(0, 0, 0, 0);
            datumB.setHours(0, 0, 0, 0);

            const rozdilMilisekundy = Math.abs(datumB - datumA);
            const rozdilDny = Math.floor(rozdilMilisekundy / (1000 * 60 * 60 * 24));

            ukazVysledek('vysledek1', `Tato data od sebe dělí přesně ${rozdilDny} dní.`);
        }

        function zjistiDatum() {
            const vstupDatum = document.getElementById('vychoziDatum').value;
            const pocetDni = parseInt(document.getElementById('pocetDni').value);

            if (!vstupDatum || isNaN(pocetDni)) {
                ukazVysledek('vysledek2', 'Prosím, vyberte datum a zadejte počet dnů.', true);
                return;
            }

            const ciloveDatum = new Date(vstupDatum);
            ciloveDatum.setDate(ciloveDatum.getDate() + pocetDni);

            const den = ciloveDatum.getDate();
            const mesic = ciloveDatum.getMonth() + 1;
            const rok = ciloveDatum.getFullYear();

            ukazVysledek('vysledek2', `Za ${pocetDni} dnů bude: ${den}. ${mesic}. ${rok}.`);
        }
    </script>

</body>
</html>
